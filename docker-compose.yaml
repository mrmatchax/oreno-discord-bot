version: '3.8'

services:
  bot:
    build: .
    container_name: data_pipeline_bot
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - bot_network

  postgres:
    image: postgres:15
    container_name: discord_bot_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bot_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: discord_bot_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - bot_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bot_network:
    driver: bridge
